name: Build Meeting AEC Helper

on:
  push:
    paths:
      - "native/meeting-aec-helper/**"
      - "scripts/build-meeting-aec-helper.js"
      - "scripts/lib/meeting-aec-build.js"
      - ".github/workflows/build-meeting-aec-helper.yml"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., 1.0.0)"
        required: false
        default: "1.0.0"
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, platform: win32, arch: x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup MSVC (Windows)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build meeting AEC helper
        run: node scripts/build-meeting-aec-helper.js --arch ${{ matrix.arch }}
        env:
          TARGET_ARCH: ${{ matrix.arch }}

      - name: Verify binary
        shell: bash
        run: |
          BIN="resources/bin/meeting-aec-helper-${{ matrix.platform }}-${{ matrix.arch }}.exe"
          test -f "$BIN" || { echo "Binary not found: $BIN"; exit 1; }
          ls -la "$BIN"

      - name: Package (zip)
        shell: pwsh
        run: |
          Compress-Archive -Path "resources/bin/meeting-aec-helper-win32-x64.exe" -DestinationPath "meeting-aec-helper-win32-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-aec-helper-${{ matrix.platform }}-${{ matrix.arch }}
          path: meeting-aec-helper-${{ matrix.platform }}-${{ matrix.arch }}.*

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: meeting-aec-helper-v${{ inputs.version || '1.0.0' }}
          name: Meeting AEC Helper v${{ inputs.version || '1.0.0' }}
          body: |
            Prebuilt WebRTC Audio Processing sidecar for meeting mic echo cancellation.

            Binaries built from `native/meeting-aec-helper/` against pinned webrtc-apm + abseil-cpp commits.
          files: meeting-aec-helper-${{ matrix.platform }}-${{ matrix.arch }}.*
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
